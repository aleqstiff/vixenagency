[build]
  command = "npm install && npm run build"
  publish = "out"

# Root → /es/ solo GET
[[redirects]]
  from = "/"
  to = "/es/"
  status = 301
  conditions = {Method = ["GET", "HEAD"]}

# SPA fallback — solo GET/HEAD, no POST
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
  conditions = {Method = ["GET", "HEAD"]}
